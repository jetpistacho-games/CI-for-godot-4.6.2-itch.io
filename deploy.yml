name: Deploy to itch.io

on:
  push:
    tags:
      - 'v*'

env:
  GODOT_VERSION: "4.6.2"

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p /github/home/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/* \
             /github/home/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Setup Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/debug.keystore

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Export Windows
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/SwingThatThing.exe

      - name: Setup Android editor settings
        run: |
          mkdir -p /github/home/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"\nexport/android/android_sdk_path = "/usr/lib/android-sdk"\n' > /github/home/.config/godot/editor_settings-4.6.tres
      - name: Export Linux
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux" build/linux/SwingThatThing.x86_64
      - name: Export macOS
        run: |
          mkdir -p build/macos
          godot --headless --export-release "macOS" build/macos/SwingThatThing.zip
      - name: Export Android
        run: |
          mkdir -p build/android
          godot --headless --export-release "Android" build/android/SwingThatThing.apk
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /tmp/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: ${{ secrets.ANDROID_KEY_ALIAS }}
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: /tmp/debug.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_KEY_ALIAS }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Setup butler
        uses: jdno/setup-butler@v1

      - name: Push Web to itch.io
        run: butler push build/web ${{ secrets.ITCHIO_USER }}/${{ secrets.ITCHIO_GAME }}:html5 --userversion ${{ github.ref_name }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push Windows to itch.io
        run: butler push build/windows ${{ secrets.ITCHIO_USER }}/${{ secrets.ITCHIO_GAME }}:windows --userversion ${{ github.ref_name }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      - name: Push Linux to itch.io
        run: butler push build/linux ${{ secrets.ITCHIO_USER }}/${{ secrets.ITCHIO_GAME }}:linux --userversion ${{ github.ref_name }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      - name: Push macOS to itch.io
        run: butler push build/macos/SwingThatThing.zip ${{ secrets.ITCHIO_USER }}/${{ secrets.ITCHIO_GAME }}:osx --userversion ${{ github.ref_name }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      - name: Push Android to itch.io
        run: butler push build/android/SwingThatThing.apk ${{ secrets.ITCHIO_USER }}/${{ secrets.ITCHIO_GAME }}:android --userversion ${{ github.ref_name }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}